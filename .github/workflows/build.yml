name: Build binaries

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: macos-13
            arch: x86_64
          - os: macos-15
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Show environment
        run: |
          go version
          go env GOOS GOARCH

      - name: Build
        run: |
          mkdir -p dist
          GOFLAGS="-trimpath" go build -ldflags="-s -w" -o dist/gradient-engineer ./app

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradient-engineer-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/gradient-engineer
          if-no-files-found: error
          compression-level: 0


